name: Update TryHackMe Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at 12:00 AM UTC
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write # Allows the action to commit and push changes

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright Browsers and System Dependencies
        run: |
          npx playwright install --with-deps chromium

      - name: Run TryHackMe Scraper Script
        run: |
          python scripts/update_stats.py --username hey.nexxum

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update TryHackMe profile stats and activity [skip ci]"
            git push
          fi
